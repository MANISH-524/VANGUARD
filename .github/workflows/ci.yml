name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Fail on unresolved merge-conflict markers
        run: |
          if grep -rEn '^(<{7}|={7}|>{7})( |$)' \
               --include='*.py' --include='*.md' --include='*.sh' \
               --include='*.yml' --include='*.yaml' --include='*.bat' \
               --exclude-dir=.git . ; then
            echo "::error::Unresolved merge-conflict markers found. Resolve before merging."
            exit 1
          fi
          echo "No conflict markers found."

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Compile-check all modules
        run: |
          python -m compileall -q common host_control_plane guest_production_vm blue_team \
            verify.py attack_replay.py test_harness.py demo.py

      - name: Run pytest unit tests
        run: pytest -q

      - name: Run verification suite (44 assertions)
        run: python verify.py

      - name: Run attack-replay coverage (offline)
        run: python attack_replay.py --offline
